name: CI

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install
        run: npm ci
      - name: Run tests
        run: npm test

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build -t todolist-app:latest .
          docker save todolist-app:latest | gzip > image.tar.gz
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: todolist-image
          path: image.tar.gz
